<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拉杆弹珠机</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #0d1b2a, #081018 70%);
      color: #e8f1ff;
    }
    .machine {
      width: min(94vw, 430px);
      padding: 18px;
      border-radius: 16px;
      background: linear-gradient(145deg, #1b2942, #101a2f);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      display: grid;
      gap: 12px;
      justify-items: center;
    }
    #board {
      width: 100%;
      height: auto;
      border-radius: 10px;
      border: 2px solid #78a8ff;
      background: linear-gradient(#0a1322, #0e1a2e);
    }
    .stats {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 0.95rem;
      color: #a9ccff;
    }
    #launchBtn {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd44d, #ff9f1c);
      color: #1f1300;
      font-size: 1.05rem;
      font-weight: 800;
      padding: 12px 16px;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }
    #launchBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }
    #launchBtn:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }
    #status {
      margin: 0;
      min-height: 1.4em;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .tips {
      margin: 0;
      font-size: 0.86rem;
      opacity: 0.82;
      text-align: center;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="machine">
    <canvas id="board" width="390" height="560" aria-label="弹珠机游戏画布"></canvas>
    <div class="stats">
      <span id="ammoText">剩余弹珠：15</span>
      <span id="scoreText">总得分：0</span>
    </div>
    <button id="launchBtn">拉杆发射弹珠（消耗1颗）</button>
    <p id="status">准备就绪：按下按钮开始。</p>
    <p class="tips">真实玩法简化：每次发射消耗 1 颗弹珠；底部有得分区和漏球区（0分）；命中得分区后会按区间随机给分。</p>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const launchBtn = document.getElementById('launchBtn');
    const statusEl = document.getElementById('status');
    const ammoText = document.getElementById('ammoText');
    const scoreText = document.getElementById('scoreText');

    const board = {
      width: canvas.width,
      height: canvas.height,
      gravity: 0.22,
      pegs: [],
      walls: [
        { x: 18, y: 95, w: 12, h: 420 },
        { x: 360, y: 95, w: 12, h: 420 },
      ],
      slots: [
        { x: 20, w: 42, label: '漏球', range: [0, 0], miss: true },
        { x: 62, w: 48, label: '低分', range: [10, 25] },
        { x: 110, w: 58, label: '中分', range: [20, 45] },
        { x: 168, w: 54, label: '漏球', range: [0, 0], miss: true },
        { x: 222, w: 58, label: '高分', range: [40, 80] },
        { x: 280, w: 52, label: '大奖', range: [60, 120], jackpot: true },
        { x: 332, w: 40, label: '漏球', range: [0, 0], miss: true },
      ],
    };

    const ball = {
      x: board.width / 2,
      y: 56,
      vx: 0,
      vy: 0,
      r: 7,
      active: false,
    };

    let score = 0;
    let ammo = 15;
    let pullAnim = 0;
    let round = 0;

    function setupPegs() {
      board.pegs.length = 0;
      for (let row = 0; row < 9; row += 1) {
        const y = 120 + row * 42;
        const offset = row % 2 === 0 ? 0 : 20;
        for (let x = 48 + offset; x < board.width - 30; x += 40) {
          board.pegs.push({ x, y, r: 5 });
        }
      }
    }

    function randomInRange(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function updateHud() {
      ammoText.textContent = `剩余弹珠：${ammo}`;
      scoreText.textContent = `总得分：${score}`;
      launchBtn.textContent = ammo > 0 ? '拉杆发射弹珠（消耗1颗）' : '弹珠已用完';
      launchBtn.disabled = ball.active || ammo <= 0;
    }

    function drawMachine() {
      ctx.clearRect(0, 0, board.width, board.height);

      ctx.fillStyle = '#1f3a66';
      ctx.fillRect(0, 0, board.width, 78);
      ctx.fillStyle = '#8dc0ff';
      ctx.font = '700 22px "Microsoft YaHei"';
      ctx.textAlign = 'center';
      ctx.fillText('拉杆弹珠机', board.width / 2, 46);

      ctx.fillStyle = '#294a7a';
      board.walls.forEach((wall) => {
        ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
      });

      board.pegs.forEach((peg) => {
        ctx.beginPath();
        ctx.arc(peg.x, peg.y, peg.r, 0, Math.PI * 2);
        ctx.fillStyle = '#b8d1ff';
        ctx.fill();
      });

      const floorY = board.height - 85;
      ctx.fillStyle = '#152743';
      ctx.fillRect(0, floorY, board.width, 85);

      board.slots.forEach((slot) => {
        ctx.fillStyle = slot.miss ? '#3a4964' : slot.jackpot ? '#ffd44d' : '#7bb1ff';
        ctx.fillRect(slot.x, floorY, slot.w, 85);
        ctx.strokeStyle = '#203c6b';
        ctx.lineWidth = 2;
        ctx.strokeRect(slot.x, floorY, slot.w, 85);
        ctx.fillStyle = slot.miss ? '#d8e0ef' : '#10203a';
        ctx.font = '700 13px sans-serif';
        ctx.fillText(slot.label, slot.x + slot.w / 2, floorY + 33);
        ctx.font = '700 12px sans-serif';
        const rangeText = slot.miss ? '0分' : `${slot.range[0]}~${slot.range[1]}`;
        ctx.fillText(rangeText, slot.x + slot.w / 2, floorY + 56);
      });

      ctx.fillStyle = '#95bdfc';
      ctx.font = '700 14px sans-serif';
      ctx.fillText(`第 ${round} 发`, board.width / 2, board.height - 8);

      const leverX = board.width - 17;
      const leverTop = 90 + pullAnim * 12;
      const leverBottom = 166 + pullAnim * 12;
      ctx.strokeStyle = '#f3b23e';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(leverX, leverTop);
      ctx.lineTo(leverX, leverBottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(leverX, leverBottom + 10, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#ffcf5f';
      ctx.fill();

      if (ball.active) {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ff6a88';
        ctx.shadowColor = 'rgba(255,106,136,0.6)';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function launchBall() {
      if (ball.active || ammo <= 0) return;
      ammo -= 1;
      round += 1;
      ball.active = true;
      ball.x = board.width / 2 + (Math.random() - 0.5) * 20;
      ball.y = 56;
      ball.vx = (Math.random() - 0.5) * 2.2;
      ball.vy = 1.4;
      pullAnim = 1;
      statusEl.textContent = `第 ${round} 发：弹珠发射，等待落袋...`;
      updateHud();
      setTimeout(() => {
        pullAnim = 0;
      }, 120);
    }

    function settleResult() {
      const floorY = board.height - 85;
      const slot = board.slots.find((item) => ball.x >= item.x && ball.x <= item.x + item.w);
      let thisGain = 0;
      let message = '漏球，未得分。';

      if (slot && !slot.miss) {
        thisGain = randomInRange(slot.range[0], slot.range[1]);
        score += thisGain;
        if (slot.jackpot) {
          message = `🎉 大奖区命中！随机得分 +${thisGain}`;
        } else {
          message = `${slot.label}命中！随机得分 +${thisGain}`;
        }
      }

      if (ammo <= 0 && !ball.active) {
        message += ` 弹珠已耗尽，最终得分 ${score}。`;
      }

      statusEl.textContent = `${message}（当前 ${score} 分）`;
      ball.active = false;
      ball.y = floorY - ball.r;
      updateHud();
    }

    function updateBall() {
      if (!ball.active) return;

      ball.vy += board.gravity;
      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.x < 30 + ball.r || ball.x > board.width - 30 - ball.r) {
        ball.vx *= -0.75;
        ball.x = Math.max(30 + ball.r, Math.min(board.width - 30 - ball.r, ball.x));
      }

      board.pegs.forEach((peg) => {
        const dx = ball.x - peg.x;
        const dy = ball.y - peg.y;
        const dist = Math.hypot(dx, dy);
        const minDist = ball.r + peg.r;
        if (dist < minDist) {
          const nx = dx / (dist || 1);
          const ny = dy / (dist || 1);
          const overlap = minDist - dist;
          ball.x += nx * overlap;
          ball.y += ny * overlap;
          const dot = ball.vx * nx + ball.vy * ny;
          ball.vx -= 1.8 * dot * nx;
          ball.vy -= 1.8 * dot * ny;
          ball.vx += (Math.random() - 0.5) * 0.4;
          ball.vx = Math.max(-2.5, Math.min(2.5, ball.vx));
          ball.vy = Math.max(ball.vy, 0.4);
        }
      });

      if (ball.y >= board.height - 85 - ball.r) {
        settleResult();
      }
    }

    function tick() {
      updateBall();
      drawMachine();
      requestAnimationFrame(tick);
    }

    setupPegs();
    updateHud();
    drawMachine();
    tick();

    launchBtn.addEventListener('click', launchBall);
  </script>
</body>
</html>
